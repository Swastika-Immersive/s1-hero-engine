<div id="root"><div class="loading">Loading…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ===== COLORS =====
const ACCENT = "#7C3AED", TEAL = "#14B8A6", GOLD = "#F59E0B", PINK = "#EC4899";
const GREEN = "#10B981", BLUE = "#3B82F6", ORANGE = "#F97316";
const OFF = "#E5E7EB", MUTED = "#9CA3AF", CARD = "#111827", BG = "#0A0A12";

// ===== SLIDE DIMENSIONS (fixed) =====
const SLIDE_W = 1600;
const SLIDE_H = 900;

// ===== SCALE-TO-FIT WRAPPER =====
function ScaleToFit({ children }) {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const compute = () => {
      const w = window.innerWidth;
      const h = window.innerHeight - 88; // minus top + bottom bars
      setScale(Math.min(w / SLIDE_W, h / SLIDE_H));
    };
    compute();
    window.addEventListener('resize', compute);
    return () => window.removeEventListener('resize', compute);
  }, []);
  return (
    <div style={{ width: "100%", height: "100%", display: "flex", justifyContent: "center", alignItems: "center", overflow: "hidden", background: "#050508" }}>
      <div style={{ width: SLIDE_W, height: SLIDE_H, transform: `scale(${scale})`, transformOrigin: "center center", flexShrink: 0, position: "relative" }}>
        {children}
      </div>
    </div>
  );
}

// ===== REUSABLE =====
function Tag({ text, color = ACCENT, size = 16 }) {
  return (
    <span style={{
      background: color + "22", border: `1px solid ${color}55`, color,
      fontSize: size, fontWeight: 800, letterSpacing: 3,
      padding: "8px 18px", borderRadius: 26, textTransform: "uppercase",
      display: "inline-block",
    }}>{text}</span>
  );
}

function slideBase(bg = BG) {
  return {
    width: SLIDE_W, height: SLIDE_H, background: bg,
    position: "relative", overflow: "hidden",
    padding: "70px 100px", display: "flex", flexDirection: "column",
  };
}

function SideBar({ color = ACCENT }) {
  return <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 8, background: `linear-gradient(180deg, ${color}, ${color}44)` }} />;
}
function CornerGlow({ color = ACCENT }) {
  return <div style={{ position: "absolute", right: -220, top: -220, width: 800, height: 800, borderRadius: "50%", background: `radial-gradient(circle, ${color}15 0%, transparent 65%)`, pointerEvents: "none" }} />;
}

function H1({ children, color = "#fff", size = 96 }) {
  return <div style={{ fontFamily: "Georgia, serif", fontSize: size, fontWeight: 700, color, lineHeight: 1.02, margin: "0 0 20px" }}>{children}</div>;
}
function H2({ children, color = MUTED, size = 28 }) {
  return <div style={{ color, fontSize: size, lineHeight: 1.5, marginBottom: 44, maxWidth: 1200 }}>{children}</div>;
}

    <div style={{ ...slideBase(BG), alignItems: "center", justifyContent: "center", textAlign: "center" }}>
      <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", width: 1200, height: 1200, borderRadius: "50%", background: `radial-gradient(circle, ${ACCENT}20 0%, transparent 55%)`, pointerEvents: "none" }} />
      <div style={{ position: "relative", zIndex: 1, maxWidth: 1200, margin: "auto" }}>
        <Tag text="That's it." color={ACCENT} size={20} />
        <div style={{ fontFamily: "Georgia, serif", fontSize: 130, fontWeight: 700, color: "#fff", lineHeight: 1.02, margin: "36px 0 28px" }}>
          Go make something<br/>
          <span style={{ color: ACCENT }}>beautiful.</span>
        </div>
        <div style={{ color: MUTED, fontSize: 28, maxWidth: 900, margin: "0 auto 36px", lineHeight: 1.5 }}>
          Your homework:
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 18, maxWidth: 900, margin: "0 auto 44px", textAlign: "left" }}>
          {[
            { n: "1", t: "Write down one skill you already have. Tonight.", col: GOLD },
            { n: "2", t: "Set up one Claude automation. This week.", col: TEAL },
            { n: "3", t: "Next shoot brief → S1 → Weavy → ship.", col: ACCENT },
          ].map(h => (
            <div key={h.n} style={{ background: CARD, borderRadius: 16, padding: "24px 34px", borderLeft: `5px solid ${h.col}`, display: "flex", alignItems: "center", gap: 24 }}>
              <div style={{ width: 54, height: 54, borderRadius: "50%", background: h.col, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 22, flexShrink: 0 }}>{h.n}</div>
              <div style={{ fontSize: 24, color: OFF }}>{h.t}</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 18, color: MUTED, letterSpacing: 4, fontWeight: 700 }}>S1 × WEAVY · THANK YOU</div>
      </div>
    </div>
  );
}

// ===== MAIN APP =====
const slides = [
  { key: "cover", label: "Cover", comp: SlideCover },
  { key: "momdad-intro", label: "ChatGPT vs Claude", comp: SlideMomDadIntro },
  { key: "momdad-compare", label: "Mom vs Dad", comp: SlideMomDadCompare },
  { key: "live-demo", label: "Live Demo", comp: SlideLiveDemo },
  { key: "what-skill", label: "What is a Skill", comp: SlideWhatIsSkill },
  { key: "skill-examples", label: "Skill Examples", comp: SlideSkillExamples },
  { key: "automations", label: "Automations", comp: SlideAutomations },
  { key: "backstage", label: "Cook+Kitchen+Msg", comp: SlideBackstage },
  { key: "my-story", label: "My Story", comp: SlideMyStory },
  { key: "weavy-transition", label: "Weavy", comp: SlideWeavyTransition },
  { key: "role-play", label: "Role-Play", comp: SlideRolePlay },
  { key: "3d-mindset", label: "3D Mindset", comp: Slide3DMindset },
  { key: "lighting", label: "Lighting", comp: SlideLighting },
  { key: "camera", label: "Camera", comp: SlideCamera },
  { key: "weavy-flow", label: "Weavy Flow", comp: SlideWeavyFlow },
  { key: "demo", label: "Demo", comp: SlideDemo },
  { key: "why-prompts", label: "Why Prompts", comp: SlideWhyPrompts },
  { key: "s1-reveal", label: "S1 Reveal", comp: SlideS1Reveal },
  { key: "s1-stats", label: "S1 Stats", comp: SlideS1Stats },
  { key: "loop", label: "S1 × Weavy", comp: SlideLoop },
  { key: "close", label: "Close", comp: SlideClose },
];

function App() {
  const [current, setCurrent] = useState(0);
  const [navOpen, setNavOpen] = useState(false);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight" || e.key === " ") setCurrent(p => Math.min(slides.length - 1, p + 1));
      if (e.key === "ArrowLeft") setCurrent(p => Math.max(0, p - 1));
      if (e.key === "Home") setCurrent(0);
      if (e.key === "End") setCurrent(slides.length - 1);
      if (e.key === "f" || e.key === "F") {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const SlideComp = slides[current].comp;

  return (
    <div style={{ background: "#050508", height: "100vh", display: "flex", flexDirection: "column" }}>
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "10px 20px", borderBottom: "1px solid #1a1a2e",
        background: "#08080f", flexShrink: 0,
      }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: ACCENT, letterSpacing: 2 }}>IMAGE GEN × S1 × WEAVY</div>
        <button onClick={() => setNavOpen(!navOpen)} style={{
          background: "transparent", border: `1px solid ${MUTED}55`, color: MUTED,
          padding: "5px 14px", borderRadius: 16, fontSize: 12, cursor: "pointer",
        }}>
          {navOpen ? "✕ Close" : "☰ Slides"}
        </button>
        <div style={{ fontSize: 12, color: MUTED, fontFamily: "monospace" }}>{current + 1} / {slides.length}</div>
      </div>

      {navOpen && (
        <div style={{
          position: "absolute", top: 42, left: 0, right: 0, zIndex: 100,
          background: "#0a0a14", borderBottom: "1px solid #1a1a2e",
          padding: "16px 20px", maxHeight: "70vh", overflowY: "auto",
        }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 8 }}>
            {slides.map((s, i) => (
              <button key={s.key} onClick={() => { setCurrent(i); setNavOpen(false); }} style={{
                background: i === current ? ACCENT + "33" : CARD,
                border: `1px solid ${i === current ? ACCENT : "#2a2a3e"}`,
                color: i === current ? "#fff" : OFF,
                padding: "10px 14px", borderRadius: 10, fontSize: 12,
                cursor: "pointer", textAlign: "left", fontWeight: 600,
              }}>
                <div style={{ color: MUTED, fontSize: 10, marginBottom: 2 }}>{String(i+1).padStart(2,"0")}</div>
                {s.label}
              </button>
            ))}
          </div>
        </div>
      )}

      <div style={{ flex: 1, minHeight: 0 }}>
        <ScaleToFit>
          <SlideComp />
        </ScaleToFit>
      </div>

      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "10px 24px", borderTop: "1px solid #1a1a2e",
        background: "#08080f", flexShrink: 0,
      }}>
        <button onClick={() => setCurrent(p => Math.max(0, p - 1))} disabled={current === 0} style={{
          background: current === 0 ? "#111" : CARD, border: "1px solid #2a2a3e",
          color: current === 0 ? "#333" : OFF, padding: "7px 18px", borderRadius: 8,
          cursor: current === 0 ? "not-allowed" : "pointer", fontSize: 13, fontWeight: 600,
        }}>← Prev</button>
        <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
          {slides.map((_, i) => (
            <div key={i} onClick={() => setCurrent(i)} style={{
              width: i === current ? 22 : 6, height: 6, borderRadius: 3,
              background: i === current ? ACCENT : "#2a2a3e",
              cursor: "pointer", transition: "all 0.25s ease",
            }} />
          ))}
        </div>
        <button onClick={() => setCurrent(p => Math.min(slides.length - 1, p + 1))} disabled={current === slides.length - 1} style={{
          background: current === slides.length - 1 ? "#111" : ACCENT, border: "none",
          color: current === slides.length - 1 ? "#333" : "#fff", padding: "7px 20px", borderRadius: 8,
          cursor: current === slides.length - 1 ? "not-allowed" : "pointer", fontSize: 13, fontWeight: 700,
        }}>Next →</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
