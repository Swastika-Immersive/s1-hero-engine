<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Image Generation — From Prompt to Production</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Georgia&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #050508;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: #fff;
    height: 100vh;
    overflow: hidden;
  }
  * { box-sizing: border-box; }
  #root { height: 100vh; }
  button { font-family: inherit; }
  .loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #9CA3AF; }
</style>
</head>
<body>
<div id="root"><div class="loading">Loading…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ===== COLORS =====
const ACCENT = "#7C3AED";
const TEAL = "#14B8A6";
const GOLD = "#F59E0B";
const PINK = "#EC4899";
const GREEN = "#10B981";
const BLUE = "#3B82F6";
const ORANGE = "#F97316";
const OFF = "#E5E7EB";
const MUTED = "#9CA3AF";
const CARD = "#111827";
const CARD_LIGHT = "#1A2030";
const BG = "#0A0A12";

// ===== REUSABLE COMPONENTS =====
function Tag({ text, color = ACCENT }) {
  return (
    <span style={{
      background: color + "22",
      border: `1px solid ${color}55`,
      color: color,
      fontSize: 11,
      fontWeight: 700,
      letterSpacing: 2.5,
      padding: "4px 12px",
      borderRadius: 20,
      textTransform: "uppercase",
      display: "inline-block",
    }}>{text}</span>
  );
}

const slideBase = {
  width: "100%", height: "100%", position: "relative", overflow: "auto",
  boxSizing: "border-box", display: "flex", flexDirection: "column",
  justifyContent: "center", padding: "40px 72px",
};

function SlideShell({ children, bg = BG, accent = ACCENT, center = false }) {
  return (
    <div style={{ ...slideBase, background: bg, alignItems: center ? "center" : "flex-start", textAlign: center ? "center" : "left" }}>
      <div style={{ maxWidth: 1280, width: "100%", margin: "0 auto", position: "relative", zIndex: 1 }}>
        {children}
      </div>
      <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 5, background: `linear-gradient(180deg, ${accent}, ${accent}44)` }} />
      <div style={{ position: "absolute", right: -180, top: -180, width: 600, height: 600, borderRadius: "50%", background: `radial-gradient(circle, ${accent}12 0%, transparent 70%)`, pointerEvents: "none" }} />
    </div>
  );
}

function H1({ children, color = "#fff" }) {
  return <div style={{ fontFamily: "Georgia, serif", fontSize: 54, fontWeight: 700, color, lineHeight: 1.05, margin: "16px 0 12px" }}>{children}</div>;
}
function H2({ children, color = MUTED, maxWidth = 820 }) {
  return <div style={{ color, fontSize: 18, lineHeight: 1.6, marginBottom: 32, maxWidth }}>{children}</div>;
}

// ===== SLIDE 1: COVER =====
function SlideCover() {
  return (
    <div style={{ ...slideBase, background: BG, justifyContent: "center" }}>
      <div style={{ position: "absolute", right: -150, top: -150, width: 700, height: 700, borderRadius: "50%", background: `radial-gradient(circle, ${ACCENT}22 0%, transparent 65%)`, pointerEvents: "none" }} />
      <div style={{ position: "absolute", left: -100, bottom: -100, width: 500, height: 500, borderRadius: "50%", background: `radial-gradient(circle, ${TEAL}15 0%, transparent 65%)`, pointerEvents: "none" }} />
      <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 6, background: `linear-gradient(180deg, ${ACCENT}, ${TEAL})` }} />

      <div style={{ maxWidth: 1100, width: "100%", margin: "0 auto", position: "relative", zIndex: 1 }}>
        <Tag text="A Talk · 20 slides · ~25 min" color={ACCENT} />
        <div style={{ fontFamily: "Georgia, serif", fontSize: 88, fontWeight: 700, lineHeight: 1.0, color: "#fff", margin: "20px 0 2px" }}>
          Image Generation
        </div>
        <div style={{ fontFamily: "Georgia, serif", fontSize: 88, fontWeight: 700, lineHeight: 1.0, color: ACCENT, marginBottom: 28 }}>
          From Prompt to Production.
        </div>
        <div style={{ color: OFF, fontSize: 20, maxWidth: 720, lineHeight: 1.6, marginBottom: 36 }}>
          Not the "type a prompt, get a meh result" kind.
          <br />The <span style={{ color: TEAL, fontWeight: 600 }}>"I can't believe this shipped in 10 minutes"</span> kind.
        </div>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
          {["Claude × Skills", "Weavy × 3D Mindset", "S1 × Production"].map((t, i) => (
            <span key={t} style={{
              background: [ACCENT, TEAL, GOLD][i] + "15",
              border: `1px solid ${[ACCENT, TEAL, GOLD][i]}44`,
              color: [ACCENT, TEAL, GOLD][i],
              padding: "8px 18px", borderRadius: 22,
              fontSize: 13, fontWeight: 600,
            }}>{t}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

// ===== SLIDE 2: MOM vs DAD INTRO =====
function SlideMomDadIntro() {
  return (
    <SlideShell accent={PINK} center>
      <Tag text="Round 1 · The Parents" color={PINK} />
      <H1>ChatGPT or Claude?</H1>
      <div style={{ color: MUTED, fontSize: 20, maxWidth: 700, margin: "0 auto 40px", lineHeight: 1.6 }}>
        Both are brilliant. But they parent you very differently.
      </div>
      <div style={{ display: "flex", gap: 40, justifyContent: "center", alignItems: "center", marginTop: 20 }}>
        <div style={{ fontSize: 140 }}>👩</div>
        <div style={{ fontSize: 40, color: MUTED, fontWeight: 300 }}>vs</div>
        <div style={{ fontSize: 140 }}>👨</div>
      </div>
      <div style={{ display: "flex", gap: 40, justifyContent: "center", marginTop: 12 }}>
        <div style={{ fontSize: 22, fontWeight: 700, color: PINK, width: 140 }}>ChatGPT</div>
        <div style={{ width: 40 }} />
        <div style={{ fontSize: 22, fontWeight: 700, color: ACCENT, width: 140 }}>Claude</div>
      </div>
    </SlideShell>
  );
}

// ===== SLIDE 3: MOM vs DAD COMPARISON =====
function SlideMomDadCompare() {
  const bubble = (text, bg, border, align = "left") => (
    <div style={{
      background: bg, border: `1px solid ${border}`,
      borderRadius: 18, padding: "16px 20px", marginBottom: 12,
      fontSize: 15, color: OFF, maxWidth: 340,
      marginLeft: align === "right" ? "auto" : 0,
      marginRight: align === "left" ? "auto" : 0,
    }}>{text}</div>
  );
  return (
    <SlideShell accent={PINK}>
      <Tag text="The Difference" color={PINK} />
      <H1>Think of them like <span style={{color: PINK}}>parents</span>.</H1>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 32, marginTop: 20 }}>
        <div style={{ background: "#1A0F1F", borderRadius: 18, padding: 28, border: `1px solid ${PINK}33` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
            <div style={{ fontSize: 40 }}>👩</div>
            <div>
              <div style={{ fontSize: 20, fontWeight: 800, color: PINK }}>ChatGPT = Mom</div>
              <div style={{ fontSize: 13, color: MUTED }}>Warm. Encouraging. Optional.</div>
            </div>
          </div>
          {bubble("Here are 5 options to consider, feel free to mix and match...", PINK + "15", PINK + "33")}
          {bubble("Would you like me to explore another direction?", PINK + "15", PINK + "33")}
          {bubble("You know best! Trust yourself 💕", PINK + "15", PINK + "33")}
          <div style={{ marginTop: 18, fontSize: 13, color: MUTED, fontStyle: "italic" }}>
            → Great for: brainstorming, exploring, feeling supported.
          </div>
        </div>

        <div style={{ background: "#0F0F1F", borderRadius: 18, padding: 28, border: `1px solid ${ACCENT}33` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
            <div style={{ fontSize: 40 }}>👨</div>
            <div>
              <div style={{ fontSize: 20, fontWeight: 800, color: ACCENT }}>Claude = Dad</div>
              <div style={{ fontSize: 13, color: MUTED }}>Sharp. Decisive. Honest.</div>
            </div>
          </div>
          {bubble("Do this. It's the right call.", ACCENT + "15", ACCENT + "33")}
          {bubble("That idea won't work. Here's why.", ACCENT + "15", ACCENT + "33")}
          {bubble("Ship this version. It's ready.", ACCENT + "15", ACCENT + "33")}
          <div style={{ marginTop: 18, fontSize: 13, color: MUTED, fontStyle: "italic" }}>
            → Great for: deciding, shipping, trusting the call.
          </div>
        </div>
      </div>
    </SlideShell>
  );
}

// ===== SLIDE 4: LIVE PROMPT DEMO =====
function SlideLiveDemo() {
  return (
    <SlideShell accent={PINK}>
      <Tag text="Live Demo" color={PINK} />
      <H1>Same prompt. Two brains.</H1>

      <div style={{ background: CARD, borderRadius: 14, padding: "18px 24px", border: `1px dashed ${MUTED}55`, marginBottom: 24, maxWidth: 820 }}>
        <div style={{ fontSize: 11, color: MUTED, letterSpacing: 2, fontWeight: 700, marginBottom: 8 }}>PROMPT</div>
        <div style={{ fontSize: 17, color: OFF, fontStyle: "italic" }}>
          "Write a one-line tagline for a premium cookware brand."
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
        <div style={{ background: "#1A0F1F", borderRadius: 14, padding: "24px 26px", borderTop: `4px solid ${PINK}` }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: PINK, marginBottom: 14, letterSpacing: 1 }}>👩 CHATGPT SAID:</div>
          <div style={{ fontSize: 14, color: OFF, lineHeight: 1.7 }}>
            Here are 5 options to try:<br/>
            <span style={{ color: MUTED }}>1. "Cook with passion"<br/>
            2. "Where meals become memories"<br/>
            3. "Crafted for your kitchen"<br/>
            4. "The art of cooking, perfected"<br/>
            5. "Elevate every meal"</span><br/><br/>
            Let me know if you'd like more variations! 😊
          </div>
        </div>
        <div style={{ background: "#0F0F1F", borderRadius: 14, padding: "24px 26px", borderTop: `4px solid ${ACCENT}`, display: "flex", flexDirection: "column", justifyContent: "center" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: ACCENT, marginBottom: 14, letterSpacing: 1 }}>👨 CLAUDE SAID:</div>
          <div style={{ fontFamily: "Georgia, serif", fontSize: 36, color: "#fff", fontWeight: 700, lineHeight: 1.2 }}>
            "Cook like you mean it."
          </div>
          <div style={{ marginTop: 20, fontSize: 13, color: GREEN, fontWeight: 600 }}>
            ✓ Done. Ship it.
          </div>
        </div>
      </div>

      <div style={{ marginTop: 24, background: TEAL + "12", border: `1px solid ${TEAL}33`, borderRadius: 12, padding: "14px 20px" }}>
        <span style={{ color: TEAL, fontWeight: 700, fontSize: 14 }}>Takeaway: </span>
        <span style={{ color: OFF, fontSize: 14 }}>Mom for exploring. Dad for deciding. Pick your parent for the job.</span>
      </div>
    </SlideShell>
  );
}

      <div style={{ color: MUTED, fontSize: 18, maxWidth: 620, margin: "0 auto 36px", lineHeight: 1.6 }}>
        The easiest way to think about it:
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 30, margin: "40px 0" }}>
        <div style={{ fontSize: 120 }}>📖</div>
        <div style={{ fontSize: 40, color: GOLD }}>=</div>
        <div>
          <div style={{ fontSize: 36, fontWeight: 800, color: GOLD, fontFamily: "Georgia, serif" }}>A recipe book</div>
          <div style={{ fontSize: 16, color: MUTED, marginTop: 6 }}>you hand to Claude.</div>
        </div>
      </div>

      <div style={{ maxWidth: 680, margin: "0 auto", background: CARD, borderRadius: 14, padding: "20px 28px", borderLeft: `4px solid ${GOLD}`, textAlign: "left" }}>
        <div style={{ fontSize: 16, color: OFF, lineHeight: 1.7 }}>
          You cook a 5-min Maggi masterpiece every week? <br/>
          <span style={{ color: GOLD, fontWeight: 600 }}>That's a skill. Write it down.</span> <br/><br/>
          You're the one people ask before hard conversations? <br/>
          <span style={{ color: GOLD, fontWeight: 600 }}>That's a skill. Write it down.</span>
        </div>
      </div>

// ===== SLIDE 6: SKILL EXAMPLES =====
function SlideSkillExamples() {
  const skills = [
    { icon: "🍜", name: "5-Min Recipes", desc: "When I'm starving, give me something real.", col: GOLD },
    { icon: "💬", name: "Difficult Convo Coach", desc: "Drafts tough Slack messages with empathy.", col: PINK },

  return (

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
        {skills.map(s => (
          <div key={s.name} style={{ background: CARD, borderRadius: 14, padding: "22px 26px", borderLeft: `4px solid ${s.col}`, display: "flex", gap: 18, alignItems: "center" }}>
            <div style={{ fontSize: 44 }}>{s.icon}</div>
            <div>
              <div style={{ fontSize: 18, fontWeight: 700, color: s.col, marginBottom: 6 }}>{s.name}</div>

          </div>

      <div style={{ marginTop: 24, textAlign: "center", fontSize: 15, color: MUTED, fontStyle: "italic" }}>

      </div>

// ===== SLIDE 7: EVERYDAY AUTOMATIONS (TIMELINE) =====
function SlideAutomations() {
  const events = [
    { time: "7:00", icon: "📰", title: "Morning News", desc: "Top 3 stories + weather, in your inbox.", col: ACCENT },
    { time: "9:30", icon: "📧", title: "Gmail Drafts", desc: "Auto-drafts replies to client emails.", col: TEAL },

  ];
  return (
    <SlideShell accent={TEAL}>
      <Tag text="Claude · Every Day" color={TEAL} />
      <H1>Set it once. <span style={{color:TEAL}}>Forget it forever.</span></H1>
      <H2>These are running in the background right now. For someone, somewhere:</H2>

      {/* Timeline */}
      <div style={{ position: "relative", paddingLeft: 0, marginTop: 20 }}>
        <div style={{ position: "absolute", left: 40, top: 20, bottom: 20, width: 2, background: `linear-gradient(180deg, ${ACCENT}, ${TEAL}, ${GOLD}, ${PINK})` }} />
        {events.map((e, i) => (
          <div key={e.time} style={{ display: "flex", alignItems: "center", gap: 24, marginBottom: 18, position: "relative" }}>

            <div style={{ flex: 1, background: CARD, borderRadius: 12, padding: "14px 20px", borderLeft: `3px solid ${e.col}`, display: "flex", gap: 14, alignItems: "center" }}>
              <div style={{ fontSize: 28 }}>{e.icon}</div>
              <div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>{e.title}</div>
                <div style={{ fontSize: 13, color: MUTED }}>{e.desc}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </SlideShell>
  );
}

// ===== SLIDE 8: COOK + KITCHEN + MESSENGER =====
function SlideBackstage() {
  const roles = [
    { icon: "🧑‍🍳", name: "The Cook", tool: "Anthropic API", desc: "Claude's brain. Thinks. Writes. Decides.", col: ACCENT },

    { icon: "🛵", name: "The Messenger", tool: "Zapier", desc: "Runs between apps. Carries orders + deliveries.", col: GOLD },

  return (
    <SlideShell accent={ACCENT}>
      <Tag text="Behind the Curtain" color={ACCENT} />

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 20, marginTop: 12 }}>

          <div key={r.name} style={{ background: CARD, borderRadius: 16, padding: "28px 22px", borderTop: `4px solid ${r.col}`, textAlign: "center", position: "relative" }}>

      {/* Arrow connections */}

        <path d="M 16,5 L 50,5" stroke={ACCENT} strokeWidth="0.3" strokeDasharray="1,1" />

  { key: "skill-examples", label: "Skill Examples", comp: SlideSkillExamples },
  { key: "automations", label: "Automations", comp: SlideAutomations },
  { key: "backstage", label: "Cook+Kitchen+Msg", comp: SlideBackstage },
  { key: "my-story", label: "My Story", comp: SlideMyStory },
  { key: "weavy-transition", label: "Weavy", comp: SlideWeavyTransition },
  { key: "role-play", label: "Role-Play", comp: SlideRolePlay },
  { key: "3d-mindset", label: "3D Mindset", comp: Slide3DMindset },
  { key: "lighting", label: "Lighting", comp: SlideLighting },
  { key: "camera", label: "Camera", comp: SlideCamera },
  { key: "weavy-flow", label: "Weavy Flow", comp: SlideWeavyFlow },
  { key: "demo", label: "Demo", comp: SlideDemo },
  { key: "why-prompts", label: "Why Prompts", comp: SlideWhyPrompts },
  { key: "s1-reveal", label: "S1 Reveal", comp: SlideS1Reveal },
  { key: "s1-stats", label: "S1 Stats", comp: SlideS1Stats },
  { key: "loop", label: "S1 × Weavy", comp: SlideLoop },
  { key: "close", label: "Close", comp: SlideClose },
];

function App() {
  const [current, setCurrent] = useState(0);
  const [navOpen, setNavOpen] = useState(false);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight" || e.key === " ") setCurrent(p => Math.min(slides.length - 1, p + 1));
      if (e.key === "ArrowLeft") setCurrent(p => Math.max(0, p - 1));
      if (e.key === "Home") setCurrent(0);
      if (e.key === "End") setCurrent(slides.length - 1);
      if (e.key === "f" || e.key === "F") {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const SlideComp = slides[current].comp;

  return (
    <div style={{ background: "#050508", height: "100vh", display: "flex", flexDirection: "column" }}>
      {/* Top Bar */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "10px 20px", borderBottom: "1px solid #1a1a2e",
        background: "#08080f", flexShrink: 0,
      }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: ACCENT, letterSpacing: 2 }}>IMAGE GEN × S1 × WEAVY</div>
        <button onClick={() => setNavOpen(!navOpen)} style={{
          background: "transparent", border: `1px solid ${MUTED}55`, color: MUTED,
          padding: "5px 14px", borderRadius: 16, fontSize: 12, cursor: "pointer",
        }}>
          {navOpen ? "✕ Close" : "☰ Slides"}
        </button>
        <div style={{ fontSize: 12, color: MUTED, fontFamily: "monospace" }}>{current + 1} / {slides.length}</div>
      </div>

      {/* Slide Nav Drawer */}
      {navOpen && (
        <div style={{
          position: "absolute", top: 42, left: 0, right: 0, zIndex: 100,
          background: "#0a0a14", borderBottom: "1px solid #1a1a2e",
          padding: "16px 20px", maxHeight: "70vh", overflowY: "auto",
        }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 8 }}>
            {slides.map((s, i) => (
              <button key={s.key} onClick={() => { setCurrent(i); setNavOpen(false); }} style={{
                background: i === current ? ACCENT + "33" : CARD,
                border: `1px solid ${i === current ? ACCENT : "#2a2a3e"}`,
                color: i === current ? "#fff" : OFF,
                padding: "10px 14px", borderRadius: 10, fontSize: 12,
                cursor: "pointer", textAlign: "left", fontWeight: 600,
              }}>
                <div style={{ color: MUTED, fontSize: 10, marginBottom: 2 }}>{String(i+1).padStart(2,"0")}</div>
                {s.label}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Slide */}
      <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
        <SlideComp />
      </div>

      {/* Bottom Controls */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "10px 24px", borderTop: "1px solid #1a1a2e",
        background: "#08080f", flexShrink: 0,
      }}>
        <button onClick={() => setCurrent(p => Math.max(0, p - 1))} disabled={current === 0} style={{
          background: current === 0 ? "#111" : CARD, border: "1px solid #2a2a3e",
          color: current === 0 ? "#333" : OFF, padding: "7px 18px", borderRadius: 8,
          cursor: current === 0 ? "not-allowed" : "pointer", fontSize: 13, fontWeight: 600,
        }}>← Prev</button>

        <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
          {slides.map((_, i) => (
            <div key={i} onClick={() => setCurrent(i)} style={{
              width: i === current ? 22 : 6, height: 6, borderRadius: 3,
              background: i === current ? ACCENT : "#2a2a3e",
              cursor: "pointer", transition: "all 0.25s ease",
            }} />
          ))}
        </div>

        <button onClick={() => setCurrent(p => Math.min(slides.length - 1, p + 1))} disabled={current === slides.length - 1} style={{
          background: current === slides.length - 1 ? "#111" : ACCENT, border: "none",
          color: current === slides.length - 1 ? "#333" : "#fff", padding: "7px 20px", borderRadius: 8,
          cursor: current === slides.length - 1 ? "not-allowed" : "pointer", fontSize: 13, fontWeight: 700,
        }}>Next →</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
