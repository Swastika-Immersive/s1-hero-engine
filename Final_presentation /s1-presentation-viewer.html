  "why-different": SlideWhyDifferent,
  flow: SlideFlow,
  weavy: SlideWeavy,
  platforms: SlidePlatforms,
  team: SlideTeam,
  close: SlideClose,
};

const SLIDE_LABELS = {
  cover: "Cover",
  what: "What Is It",
  "why-different": "Why Different",
  flow: "The Flow",
  weavy: "Weavy + Bulk Render",
  platforms: "Platforms",
  team: "Team Value",
  close: "Closing",
};

function App() {
  const [current, setCurrent] = useState(0);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight") setCurrent((p) => Math.min(slides.length - 1, p + 1));
      if (e.key === "ArrowLeft") setCurrent((p) => Math.max(0, p - 1));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const SlideComp = SLIDE_COMPONENTS[slides[current].type];

  return (
    <div
      style={{
        background: "#050508",
        height: "100vh",
        fontFamily: "'Inter', system-ui, sans-serif",
        color: "#fff",
        display: "flex",
        flexDirection: "column",
      }}
    >
      <div
        style={{
          display: "flex",
          alignItems: "center",
          justifyContent: "space-between",
          padding: "12px 20px",
          borderBottom: "1px solid #1a1a2e",
          background: "#08080f",
          flexShrink: 0,
        }}
      >
        <div style={{ fontSize: 13, fontWeight: 700, color: ACCENT, letterSpacing: 1 }}>
          S1 HERO PROMPT ENGINE
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
          {slides.map((s, i) => (
            <button
              key={s.id}
              onClick={() => setCurrent(i)}
              style={{
                background: i === current ? ACCENT : "transparent",
                border: `1px solid ${i === current ? ACCENT : "#2a2a3e"}`,
                color: i === current ? "#fff" : MUTED,
                fontSize: 11,
                fontWeight: 600,
                padding: "4px 12px",
                borderRadius: 16,
                cursor: "pointer",
                letterSpacing: 0.3,
              }}
            >
              {SLIDE_LABELS[s.id]}
            </button>
          ))}
        </div>
        <div style={{ fontSize: 12, color: MUTED }}>
          {current + 1} / {slides.length}
        </div>
      </div>

      <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
        <SlideComp />
      </div>

      <div
        style={{
          display: "flex",
          alignItems: "center",
          justifyContent: "space-between",
          padding: "12px 24px",
          borderTop: "1px solid #1a1a2e",
          background: "#08080f",
          flexShrink: 0,
        }}
      >
        <button
          onClick={() => setCurrent((p) => Math.max(0, p - 1))}
          disabled={current === 0}
          style={{
            background: current === 0 ? "#111" : CARD,
            border: "1px solid #2a2a3e",
            color: current === 0 ? "#333" : OFF,
            padding: "8px 20px",
            borderRadius: 8,
            cursor: current === 0 ? "not-allowed" : "pointer",
            fontSize: 13,
            fontWeight: 600,
          }}
        >
          ← Prev
        </button>

        <div style={{ display: "flex", gap: 6 }}>
          {slides.map((_, i) => (
            <div
              key={i}
              onClick={() => setCurrent(i)}
              style={{
                width: i === current ? 20 : 7,
                height: 7,
                borderRadius: 4,
                background: i === current ? ACCENT : "#2a2a3e",
                cursor: "pointer",
                transition: "all 0.2s ease",
              }}
            />
          ))}
        </div>

        <button
          onClick={() => setCurrent((p) => Math.min(slides.length - 1, p + 1))}
          disabled={current === slides.length - 1}
          style={{
            background: current === slides.length - 1 ? "#111" : ACCENT,
            border: "none",
            color: current === slides.length - 1 ? "#333" : "#fff",
            padding: "8px 20px",
            borderRadius: 8,
            cursor: current === slides.length - 1 ? "not-allowed" : "pointer",
            fontSize: 13,
            fontWeight: 600,
          }}
        >
          Next →
        </button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
